name: CI
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - run: swift test
  brew:
    runs-on: macos-15
    env:
      CIRRUSLABS_CLI_REVISION: "4fef6a32df31b4c51bf745ae2d86b53a037a1a6c"
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"
      - run: echo "HOMEBREW_SWIFT=$(which swift)" >> "$GITHUB_ENV"
      - run: brew tap cirruslabs/cli
      - run: git -C "$(brew --repo cirruslabs/cli)" checkout --detach "$CIRRUSLABS_CLI_REVISION"
      - run: brew trust --formula cirruslabs/cli/tart
      - run: brew trust --formula cirruslabs/cli/softnet
      - run: brew tap-new local/sand
      - run: cp Formula/sand.rb "$(brew --repo local/sand)/Formula/sand.rb"
      - run: brew install --HEAD local/sand/sand
      - run: brew test local/sand/sand
